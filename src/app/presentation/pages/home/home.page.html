<ion-header>
  <ion-toolbar>
    <ion-title class="ion-text-center"> Lista de Tareas </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-item lines="none" color="primary">
    <ion-select
      label="Filtrar por categoría"
      placeholder="Filtrar por categoría"
      [ngModel]="selectedCategory()"
      (ngModelChange)="onCategoryChange($event)"
    >
      <ion-select-option value="">Todas</ion-select-option>

      @for (category of categories(); track category) {
        <ion-select-option [value]="category">{{ category }}</ion-select-option>
      }
    </ion-select>
  </ion-item>

  <ion-list lines="full">
    @for (todo of filteredTodos(); track todo.id) {
      <ion-item-sliding>
        <ion-item>
          <ion-checkbox
            slot="start"
            [checked]="todo.completed"
            (ionChange)="onTodoChecked(todo, $event.detail.checked)"
          ></ion-checkbox>
          <ion-label>{{ todo.title }}</ion-label>
        </ion-item>
        <ion-item-options slot="end">
          <ion-item-option color="danger" expandable="true" (click)="onDeleteTodo(todo)">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    }

    @if (filteredTodos().length === 0) {
      <ion-item>
        <ion-icon slot="start" name="sad-outline" color="primary"></ion-icon>

        Aun no tienes tareas en esta categoría.
      </ion-item>
    }
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button routerLink="/add-todo">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
