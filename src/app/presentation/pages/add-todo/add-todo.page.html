<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Add Todo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (form) {
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <ion-input
        formControlName="title"
        label="Nombre de la Tarea"
        label-placement="floating"
        fill="solid"
        placeholder="Ingrese el nombre de la tarea"
        errorText="El título es requerido"
        [disabled]="isSubmitting"
      ></ion-input>

      <ion-item class="ion-margin-top" lines="none">
        <ion-select
          errorText="La categoría es requerida"
          formControlName="category"
          label="Categoría"
          [disabled]="isSubmitting || categories.length === 0"
        >
          @for (categoryItem of categories; track categoryItem.id) {
            <ion-select-option [value]="categoryItem.name">{{ categoryItem.name }}</ion-select-option>
          }
        </ion-select>
      </ion-item>

      <ion-button type="submit" expand="block" class="ion-margin-top" [disabled]="form.invalid || isSubmitting">
        @if (isSubmitting) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <ion-icon slot="start" name="add-outline"></ion-icon>
          Agregar Tarea
        }
      </ion-button>
    </form>
  }
</ion-content>
